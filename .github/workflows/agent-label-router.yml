name: Agent Label Router

# Applies routing labels from issue-title prefixes ([agent:codex],
# [agent:claude], [agent:glm], [agent:composer-2.5], [human], [human-triage]).
# Exists because integration tokens used by cloud agents can create issues but
# cannot apply labels; the in-repo GITHUB_TOKEN can. workflow_dispatch
# backfills all open issues.
#
# Engine vocabulary mirrors .agents/envelope/linear-map.md: codex for
# DM/runtime/data/tests/cleanup, claude/glm for UI work, composer-2.5 for
# light quick tasks.

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - name: Apply routing labels from title prefix
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -eu
          ensure_label() {
            gh label create "$1" -R "$REPO" --color "$2" --description "$3" 2>/dev/null || true
          }
          ensure_label "agent:codex" "1f6feb" "Route to a Codex worker agent (DM runtime, data, plumbing, tests, cleanup)."
          ensure_label "agent:claude" "d4a72c" "Route to a Claude worker agent (UI / layout / presentation)."
          ensure_label "agent:glm" "bf3989" "Route to a GLM worker agent (UI / layout / presentation)."
          ensure_label "agent:composer-2.5" "8250df" "Route to a Composer 2.5 worker agent (light, quick tasks only)."

          route_issue() {
            number="$1"
            # Title is fetched via gh (not interpolated from event context) to
            # avoid shell injection through attacker-controlled titles.
            title="$(gh issue view "$number" -R "$REPO" --json title --jq .title)"
            case "$title" in
              "[agent:codex]"*)
                gh issue edit "$number" -R "$REPO" --add-label "agent:codex" --add-label "ready-for-agent" ;;
              "[agent:claude]"*)
                gh issue edit "$number" -R "$REPO" --add-label "agent:claude" --add-label "ready-for-agent" ;;
              "[agent:glm]"*)
                gh issue edit "$number" -R "$REPO" --add-label "agent:glm" --add-label "ready-for-agent" ;;
              "[agent:composer-2.5]"*)
                gh issue edit "$number" -R "$REPO" --add-label "agent:composer-2.5" --add-label "ready-for-agent" ;;
              "[human-triage]"*)
                gh issue edit "$number" -R "$REPO" --add-label "ready-for-human" --add-label "needs-triage" ;;
              "[human]"*)
                gh issue edit "$number" -R "$REPO" --add-label "ready-for-human" ;;
              *) ;;
            esac
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            gh issue list -R "$REPO" --state open --limit 200 --json number --jq '.[].number' |
            while read -r number; do route_issue "$number"; done
          else
            route_issue "$ISSUE_NUMBER"
          fi
